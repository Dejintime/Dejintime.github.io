---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta" style="color:#666; margin-bottom: 2rem;">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %-d, %Y" }}
      </time>
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
